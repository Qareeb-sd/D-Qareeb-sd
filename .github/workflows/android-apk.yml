name: بناء تطبيق أندرويد (APK)

# يبني ملف APK جاهزاً للتثبيت على الهاتف — يدوياً من تبويب Actions،
# أو تلقائياً عند الدفع إلى main. حمّل الناتج من قسم Artifacts في التشغيل.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['qareeb-web/**']

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # لنشر إصدار (Release) بروابط تنزيل مباشرة
    defaults:
      run:
        working-directory: qareeb-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: qareeb-web/package-lock.json

      - name: تثبيت الحزم
        run: npm ci

      - name: تجهيز متغيّرات البيئة (من أسرار المستودع)
        run: |
          cat > .env <<EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          EOF

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: تجهيز حزم Android SDK المطلوبة
        run: yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      # ===== تطبيق العميل «قريب» =====
      - name: بناء ويب العميل + APK
        run: |
          VITE_APP=customer npm run build
          npx cap sync android
          cd android && ./gradlew assembleCustomerDebug --no-daemon

      - name: رفع APK العميل «قريب»
        uses: actions/upload-artifact@v4
        with:
          name: qareeb-customer-apk
          path: qareeb-web/android/app/build/outputs/apk/customer/debug/app-customer-debug.apk
          if-no-files-found: error

      # ===== تطبيق السائق «كابتن قريب» =====
      - name: بناء ويب السائق + APK
        run: |
          VITE_APP=driver npm run build
          npx cap sync android
          cd android && ./gradlew assembleDriverDebug --no-daemon

      - name: رفع APK السائق «كابتن قريب»
        uses: actions/upload-artifact@v4
        with:
          name: qareeb-captain-apk
          path: qareeb-web/android/app/build/outputs/apk/driver/debug/app-driver-debug.apk
          if-no-files-found: error

      # ===== نشر إصدار «latest» بروابط تنزيل مباشرة للتثبيت من الهاتف =====
      - name: نشر إصدار قابل للتثبيت مباشرة
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp android/app/build/outputs/apk/customer/debug/app-customer-debug.apk qareeb-customer.apk
          cp android/app/build/outputs/apk/driver/debug/app-driver-debug.apk qareeb-captain.apk
          gh release delete latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create latest qareeb-customer.apk qareeb-captain.apk \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "أحدث إصدار — قريب" \
            --notes $'ثبّت مباشرة من هاتفك (اضغط الرابط ثم «تثبيت»):\n\n- تطبيق العميل «قريب»: qareeb-customer.apk\n- تطبيق السائق «كابتن قريب»: qareeb-captain.apk\n\nملاحظة: عند أول تثبيت فعّل «السماح بتثبيت التطبيقات من هذا المصدر».'
